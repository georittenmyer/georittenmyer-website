
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, system-ui); }
.row { display: flex; align-items: center; gap: 8px; padding: 0 0 12px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #888780; flex-shrink: 0; transition: background 0.3s; }
.dot.connected { background: #639922; }
.dot.error { background: #E24B4A; }
.status-txt { font-size: 13px; color: var(--color-text-secondary); }
.controls { display: flex; gap: 8px; margin-left: auto; }
input[type=text] { font-size: 13px; padding: 4px 8px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); width: 180px; }
button { font-size: 12px; padding: 4px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); cursor: pointer; }
button:hover { background: var(--color-background-secondary); }
.counter { font-size: 13px; color: var(--color-text-tertiary); padding: 0 0 8px; }
.list-wrap { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
.list-head { display: grid; grid-template-columns: 70px 1fr 120px; gap: 0; background: var(--color-background-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); padding: 8px 12px; font-size: 11px; color: var(--color-text-tertiary); font-weight: 500; letter-spacing: 0.04em; }
#entries { }
.entry { display: grid; grid-template-columns: 70px 1fr 120px; gap: 0; padding: 9px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; align-items: center; transition: background 0.15s; }
.entry:last-child { border-bottom: none; }
.entry.new { background: var(--color-background-info); }
.entry .time { color: var(--color-text-secondary); font-variant-numeric: tabular-nums; }
.entry .domain { color: var(--color-text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--font-mono, monospace); font-size: 12px; padding: 0 12px; }
.entry .src { color: var(--color-text-tertiary); font-size: 12px; font-family: var(--font-mono, monospace); }
.empty { padding: 32px; text-align: center; color: var(--color-text-tertiary); font-size: 14px; }
.pause-active { background: var(--color-background-warning); border-color: var(--color-border-warning); color: var(--color-text-warning); }
</style>

<div style="padding: 1rem 0 0.5rem;">
  <div class="row">
    <div class="dot" id="dot"></div>
    <span class="status-txt" id="status-txt">Disconnected</span>
    <div class="controls">
      <input type="text" id="ws-url" value="ws://localhost:8765" placeholder="ws://localhost:8765" />
      <button id="connect-btn" onclick="toggleConnect()">Connect</button>
      <button id="pause-btn" onclick="togglePause()">Pause</button>
      <button onclick="clearList()">Clear</button>
    </div>
  </div>
  <div class="counter" id="counter">0 queries captured</div>
  <div class="list-wrap">
    <div class="list-head">
      <span>Time</span><span style="padding-left:12px">Domain</span><span>Source IP</span>
    </div>
    <div id="entries">
      <div class="empty" id="empty-msg">Waiting for DNS queries…</div>
    </div>
  </div>
</div>

<script>
let ws = null;
let paused = false;
let total = 0;
const MAX = 200;

function setStatus(state, msg) {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('status-txt');
  dot.className = 'dot ' + (state === 'ok' ? 'connected' : state === 'err' ? 'error' : '');
  txt.textContent = msg;
}

function toggleConnect() {
  const btn = document.getElementById('connect-btn');
  if (ws && ws.readyState <= 1) {
    ws.close();
    btn.textContent = 'Connect';
    setStatus('', 'Disconnected');
  } else {
    connect();
  }
}

function connect() {
  const url = document.getElementById('ws-url').value.trim();
  setStatus('', 'Connecting…');
  try { ws = new WebSocket(url); } catch(e) { setStatus('err', 'Invalid URL'); return; }

  ws.onopen = () => {
    setStatus('ok', 'Connected — listening for DNS queries');
    document.getElementById('connect-btn').textContent = 'Disconnect';
  };
  ws.onmessage = (e) => {
    if (paused) return;
    try { addEntry(JSON.parse(e.data)); } catch(_) {}
  };
  ws.onerror = () => setStatus('err', 'Connection error');
  ws.onclose = () => {
    setStatus('', 'Disconnected');
    document.getElementById('connect-btn').textContent = 'Connect';
  };
}

function addEntry(d) {
  const container = document.getElementById('entries');
  const empty = document.getElementById('empty-msg');
  if (empty) empty.remove();

  total++;
  document.getElementById('counter').textContent = total + ' quer' + (total === 1 ? 'y' : 'ies') + ' captured';

  const row = document.createElement('div');
  row.className = 'entry new';
  row.innerHTML =
    '<span class="time">' + esc(d.time || '') + '</span>' +
    '<span class="domain">' + esc(d.domain || '') + '</span>' +
    '<span class="src">' + esc(d.src || '') + '</span>';
  container.insertBefore(row, container.firstChild);
  setTimeout(() => row.classList.remove('new'), 600);

  const rows = container.querySelectorAll('.entry');
  if (rows.length > MAX) rows[rows.length - 1].remove();
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('pause-btn');
  btn.textContent = paused ? 'Resume' : 'Pause';
  btn.className = paused ? 'pause-active' : '';
  setStatus(ws && ws.readyState === 1 ? 'ok' : '', paused ? 'Paused' : (ws && ws.readyState === 1 ? 'Connected — listening for DNS queries' : 'Disconnected'));
}

function clearList() {
  total = 0;
  document.getElementById('counter').textContent = '0 queries captured';
  const c = document.getElementById('entries');
  c.innerHTML = '<div class="empty" id="empty-msg">Waiting for DNS queries…</div>';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
